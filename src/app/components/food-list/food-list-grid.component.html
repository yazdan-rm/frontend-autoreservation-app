<div class="row justify-content-center">
  <div class="col" *ngFor="let tempCard of cards">
    <div class="card" style="width: 18rem">
      <img [src]="tempCard.tempFood" class="card-img-top" alt="" />
      <div class="card-body">
        {{ convertToJalaliWithWeekday(tempCard.dateCreated) }}
      </div>
      <ul class="list-group list-group-flush">
        <li class="list-group-item">
          <select
            class="form-select"
            dir="rtl"
            aria-label="Default select example"
          >
            <option dir="rtl" selected>نام گروه</option>
            <option
              dir="rtl"
              *ngFor="let tempGroup of groups"
              value="{{ tempGroup.groupName }}"
            >
              {{ tempGroup.groupName }}
            </option>
          </select>
        </li>
        <li class="list-group-item">
          <select
            #item
            (change)="onSelected(item.value, tempCard)"
            class="form-select"
            aria-label="Default select example"
          >
            <option dir="rtl" selected>نوع غذا</option>
            <option
              *ngFor="let tempFood of foods"
              dir="rtl"
              value="{{ tempFood.foodName }}"
            >
              {{ tempFood.foodName }}
            </option>
          </select>
        </li>
      </ul>
      <div class="card-body">
        <button
          type="button"
          class="btn btn-outline-success"
          style="
            border-radius: 30px;
            padding-left: 20px;
            padding-right: 20px;
            margin-right: 11px;
            margin-bottom: 8px;
          "
        >
          ثبت سفارش
        </button>
        <button
          type="button"
          class="btn btn-outline-warning"
          style="
            border-radius: 30px;
            padding-left: 20px;
            padding-right: 20px;
            margin-bottom: 8px;
          "
        >
          ثبت تغییرات
        </button>
        <button
          type="button"
          class="btn btn-outline-danger"
          style="border-radius: 30px; padding-left: 20px; padding-right: 20px"
        >
          حذف سفارش
        </button>
      </div>
    </div>
  </div>
</div>
